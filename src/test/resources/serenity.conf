serenity {
  project.name = "Pruebas Mobile Test"

  test {
    root = "oigo.com.pe.stepdefinitions"
  }
}

environment = local-qa
version-app = "1.0.61"

environments {
  local-qa {
    appium {
      platformName = "Android"
      deviceName = "emulator-5554"
      automationName = "UiAutomator2"
      hub = "http://127.0.0.1:4723/"
      appPackage = "com."
      appActivity = "com./.ui.MainActivity"
      chromedriverExecutable = "${user.dir}/src/test/resources/driver/chromedriver"
      appium.allowInsecure = chromedriver_autodownload
      appium.chromedriverAutodownload = false
      appium.adbExecTimeout = 80000
    }
  }
 browserstack-qa {
    appium {
      platformName = "Android"
      deviceName = "Samsung Galaxy S23"
      platformVersion = "13.0"
      automationName = "UiAutomator2"
      projectName = "test Unico"
       hub = "https://${BROWSERSTACK_USERNAME}:${BROWSERSTACK_ACCESS_KEY}@hub.browserstack.com/wd/hub"
      # appPackage = "com.*.*"
      # appActivity = "com.*.*.ui.MainActivity"
      app = "${BROWSERSTACK_APP_ID}"
      buildName = "${BROWSERSTACK_BUILD_NAME}"
      appWaitActivity = "*"
      appWaitDuration = 60000
      appium.autoGrantPermissions = true
      appium.newCommandTimeout = 300
      appium.idleTimeout = 300
      appium.recreateChromeDriverSessions = true
      appium.appiumVersion = 3.1.0
      appium.disableSuppressAccessibilityService = false
      appium.autoWebView = true

    }
  }
}
